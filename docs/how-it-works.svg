<svg viewBox="0 0 680 366" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="t">How ParrotIt works with your AI</title>
  <desc id="d">Your AI assistant asks the ParrotIt connector on your own computer for a detail; the connector unlocks it locally from your encrypted vault. ParrotIt's servers only ever hold a scrambled copy plus field names, never your values. Every read and save is logged, sensitive data and saving are off by default, and you can disconnect any AI at any time.</desc>

  <style>
    text { fill: #F2F5F3; }
    .sub { fill: #A7B2AC; }
    .tert { fill: #75827C; }
    .b { font-weight: 500; }
  </style>

  <!-- panel -->
  <rect x="0" y="0" width="680" height="366" rx="18" fill="#0F1714" stroke="#243029" stroke-width="1"/>

  <!-- heading -->
  <text x="340" y="44" text-anchor="middle" font-size="20" class="b">How ParrotIt works with your AI</text>
  <text x="340" y="67" text-anchor="middle" font-size="12.5" class="sub">Your details are unlocked only on your own computer — never on ParrotIt's servers.</text>

  <!-- ===== flow row ===== -->
  <!-- arrows (drawn first, behind cards) -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#10B981"/>
    </marker>
  </defs>
  <line x1="182" y1="140" x2="261" y2="140" stroke="#10B981" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="221" y="129" text-anchor="middle" font-size="10.5" class="tert">asks for it</text>
  <line x1="419" y1="140" x2="498" y2="140" stroke="#10B981" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="458" y="129" text-anchor="middle" font-size="10.5" class="tert">unlocks it</text>

  <!-- card 1: AI -->
  <rect x="28" y="88" width="150" height="104" rx="14" fill="#18211D" stroke="#2A3832" stroke-width="1"/>
  <circle cx="103" cy="116" r="19" fill="#122019" stroke="#10B981" stroke-opacity="0.32" stroke-width="1"/>
  <path d="M103 105 L105.6 113.4 L114 116 L105.6 118.6 L103 127 L100.4 118.6 L92 116 L100.4 113.4 Z" fill="#10B981"/>
  <text x="103" y="150" text-anchor="middle" font-size="13" class="b">Your AI assistant</text>
  <text x="103" y="169" text-anchor="middle" font-size="11" class="sub">Claude, Cursor, and more</text>

  <!-- card 2: connector (highlighted — the trust anchor) -->
  <rect x="265" y="88" width="150" height="104" rx="14" fill="#11231C" stroke="#10B981" stroke-opacity="0.55" stroke-width="1.4"/>
  <circle cx="340" cy="116" r="19" fill="#10341F" stroke="#10B981" stroke-opacity="0.5" stroke-width="1"/>
  <path d="M335 112 v-3.5 a5 5 0 0 1 10 0 v3.5" fill="none" stroke="#10B981" stroke-width="2"/>
  <rect x="331" y="112" width="18" height="13" rx="2.5" fill="none" stroke="#10B981" stroke-width="2"/>
  <circle cx="340" cy="118" r="1.7" fill="#10B981"/>
  <text x="340" y="150" text-anchor="middle" font-size="13" class="b">ParrotIt connector</text>
  <text x="340" y="169" text-anchor="middle" font-size="11" fill="#7FE3C0">on your computer</text>

  <!-- card 3: vault -->
  <rect x="502" y="88" width="150" height="104" rx="14" fill="#18211D" stroke="#2A3832" stroke-width="1"/>
  <circle cx="577" cy="116" r="19" fill="#122019" stroke="#10B981" stroke-opacity="0.32" stroke-width="1"/>
  <path d="M577 105 L587 109.5 V117 C587 123.5 582.5 127.5 577 129.5 C571.5 127.5 567 123.5 567 117 V109.5 Z" fill="#11251C" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="577" cy="115" r="2" fill="#10B981"/>
  <rect x="576.1" y="115" width="1.8" height="5" fill="#10B981"/>
  <text x="577" y="150" text-anchor="middle" font-size="13" class="b">Your encrypted vault</text>
  <text x="577" y="169" text-anchor="middle" font-size="11" class="sub">only you hold the key</text>

  <!-- ===== callout: what the servers can see ===== -->
  <rect x="28" y="210" width="624" height="64" rx="12" fill="#15201B" stroke="#243029" stroke-width="1"/>
  <rect x="28" y="210" width="4" height="64" rx="2" fill="#10B981"/>
  <!-- eye-off icon -->
  <g transform="translate(56 242)" stroke="#10B981" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M-10 0 C-6 -6 6 -6 10 0 C6 6 -6 6 -10 0 Z"/>
    <circle cx="0" cy="0" r="2.6" fill="#10B981" stroke="none"/>
    <line x1="-11" y1="-7" x2="11" y2="7"/>
  </g>
  <text x="84" y="237" font-size="12.5" class="b">ParrotIt's servers only ever hold a scrambled copy plus your field names.</text>
  <text x="84" y="258" font-size="12.5" class="sub">They never see your actual values — only the connector, on your device, can read them.</text>

  <!-- ===== guarantees row ===== -->
  <g>
    <!-- col 1 -->
    <circle cx="132" cy="300" r="11" fill="#122019" stroke="#10B981" stroke-opacity="0.4"/>
    <path d="M127 300 l3.4 3.4 l6 -6.4" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="132" y="328" text-anchor="middle" font-size="11" class="b">Every read and save</text>
    <text x="132" y="343" text-anchor="middle" font-size="11" class="sub">is logged in the app</text>
    <!-- col 2 -->
    <circle cx="340" cy="300" r="11" fill="#122019" stroke="#10B981" stroke-opacity="0.4"/>
    <path d="M335 300 l3.4 3.4 l6 -6.4" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="340" y="328" text-anchor="middle" font-size="11" class="b">Sensitive data and saving</text>
    <text x="340" y="343" text-anchor="middle" font-size="11" class="sub">are off by default</text>
    <!-- col 3 -->
    <circle cx="548" cy="300" r="11" fill="#122019" stroke="#10B981" stroke-opacity="0.4"/>
    <path d="M543 300 l3.4 3.4 l6 -6.4" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="548" y="328" text-anchor="middle" font-size="11" class="b">Disconnect any AI</text>
    <text x="548" y="343" text-anchor="middle" font-size="11" class="sub">at any time</text>
  </g>
</svg>
