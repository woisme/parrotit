<svg viewBox="0 0 680 282" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title id="t">Fill once, never type the same details again</title>
  <desc id="d">Without ParrotIt you retype the same name, email and address into every form. With ParrotIt you save your details once and your AI fills every form from your encrypted vault.</desc>

  <style>
    text { fill: #F2F5F3; }
    .sub { fill: #A7B2AC; }
    .tert { fill: #75827C; }
    .b { font-weight: 500; }
    .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
  </style>

  <rect x="0" y="0" width="680" height="282" rx="18" fill="#0F1714" stroke="#243029" stroke-width="1"/>
  <text x="340" y="40" text-anchor="middle" font-size="19" class="b">Stop re-typing the same details</text>
  <line x1="340" y1="62" x2="340" y2="256" stroke="#243029" stroke-width="1"/>

  <!-- ===== LEFT: without ParrotIt ===== -->
  <text x="44" y="86" font-size="12" class="tert b">Without ParrotIt</text>
  <!-- repeat icon -->
  <g transform="translate(296 82)" stroke="#75827C" stroke-width="1.5" fill="none" stroke-linecap="round">
    <path d="M-7 -1 a7 7 0 1 1 1.6 4.5"/>
    <path d="M-7 -6 v5 h5"/>
  </g>

  <!-- three forms, all asking the same -->
  <g>
    <rect x="44" y="100" width="256" height="38" rx="10" fill="#161E1A" stroke="#2A3832"/>
    <rect x="56" y="113" width="13" height="13" rx="2.5" fill="none" stroke="#46524C" stroke-width="1.3"/>
    <text x="80" y="123" font-size="11" class="sub">Form 1 · name, email, address</text>
    <rect x="268" y="116" width="1.6" height="9" fill="#10B981"/>

    <rect x="44" y="146" width="256" height="38" rx="10" fill="#161E1A" stroke="#2A3832"/>
    <rect x="56" y="159" width="13" height="13" rx="2.5" fill="none" stroke="#46524C" stroke-width="1.3"/>
    <text x="80" y="169" font-size="11" class="sub">Form 2 · name, email, address</text>
    <rect x="268" y="162" width="1.6" height="9" fill="#10B981"/>

    <rect x="44" y="192" width="256" height="38" rx="10" fill="#161E1A" stroke="#2A3832"/>
    <rect x="56" y="205" width="13" height="13" rx="2.5" fill="none" stroke="#46524C" stroke-width="1.3"/>
    <text x="80" y="215" font-size="11" class="sub">Form 3 · name, email, address</text>
    <rect x="268" y="208" width="1.6" height="9" fill="#10B981"/>
  </g>
  <text x="44" y="252" font-size="12" class="sub">Type it all again on every single form.</text>

  <!-- ===== RIGHT: with ParrotIt ===== -->
  <text x="372" y="86" font-size="12" class="b" fill="#10B981">With ParrotIt</text>

  <!-- vault -->
  <rect x="372" y="110" width="58" height="58" rx="13" fill="#11231C" stroke="#10B981" stroke-opacity="0.5"/>
  <path d="M396 134 v-3.5 a5 5 0 0 1 10 0 v3.5" fill="none" stroke="#10B981" stroke-width="2"/>
  <rect x="392" y="134" width="18" height="13" rx="2.5" fill="none" stroke="#10B981" stroke-width="2"/>
  <circle cx="401" cy="140" r="1.7" fill="#10B981"/>
  <text x="401" y="184" text-anchor="middle" font-size="10" class="sub">your vault</text>

  <!-- arrows to filled forms -->
  <defs>
    <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#10B981"/>
    </marker>
  </defs>
  <path d="M432 132 H470" fill="none" stroke="#10B981" stroke-width="1.4" stroke-opacity="0.8" marker-end="url(#a2)"/>
  <path d="M432 139 C452 139 452 165 470 165" fill="none" stroke="#10B981" stroke-width="1.4" stroke-opacity="0.8" marker-end="url(#a2)"/>
  <path d="M432 146 C452 146 452 199 470 199" fill="none" stroke="#10B981" stroke-width="1.4" stroke-opacity="0.8" marker-end="url(#a2)"/>

  <!-- filled forms -->
  <g>
    <rect x="476" y="114" width="160" height="34" rx="9" fill="#13201A" stroke="#234A39"/>
    <circle cx="492" cy="131" r="8" fill="#11231C" stroke="#10B981" stroke-opacity="0.5"/>
    <path d="M488 131 l2.6 2.6 l4.6 -5" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="508" y="127" width="112" height="8" rx="4" fill="#1F6B4F"/>

    <rect x="476" y="148" width="160" height="34" rx="9" fill="#13201A" stroke="#234A39"/>
    <circle cx="492" cy="165" r="8" fill="#11231C" stroke="#10B981" stroke-opacity="0.5"/>
    <path d="M488 165 l2.6 2.6 l4.6 -5" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="508" y="161" width="112" height="8" rx="4" fill="#1F6B4F"/>

    <rect x="476" y="182" width="160" height="34" rx="9" fill="#13201A" stroke="#234A39"/>
    <circle cx="492" cy="199" r="8" fill="#11231C" stroke="#10B981" stroke-opacity="0.5"/>
    <path d="M488 199 l2.6 2.6 l4.6 -5" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="508" y="195" width="112" height="8" rx="4" fill="#1F6B4F"/>
  </g>
  <text x="372" y="252" font-size="12" class="sub">Saved once — your AI fills them all.</text>
</svg>
